# MongoDB
spring.data.mongodb.uri=${GENEA_MONGODB_URI:mongodb://localhost:27017/genea}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}

# SMTP (set credentials through environment variables)
spring.mail.host=${GENEA_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${GENEA_MAIL_PORT:587}
spring.mail.username=${GENEA_MAIL_USERNAME:}
spring.mail.password=${GENEA_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.jackson.deserialization.accept-empty-string-as-null-object=true
