<app-navbar></app-navbar>

<main class="app-page">
  <section class="page-panel">
    <header class="page-header">
      <h1 class="page-title">{{ i18n.t('team.title') }}</h1>
      <p class="page-subtitle">{{ i18n.t('team.subtitle') }}</p>
    </header>

    <div class="team-grid" *ngIf="team.length; else noTeam">
      <article class="member-card" *ngFor="let member of team">
        <div class="avatar" [class.placeholder]="!member.photo">
          <img *ngIf="member.photo" [src]="member.photo" [alt]="member.name" />
          <span *ngIf="!member.photo">{{ (member.firstname || '?') | slice:0:1 }}</span>
        </div>
        <div class="info">
          <h3>{{ member.name || '-' }}</h3>
          <p>{{ member.desc || i18n.t('team.noDescription') }}</p>
          <small>{{ member.email || '-' }}</small>
        </div>
      </article>
    </div>

    <ng-template #noTeam>
      <p class="empty">{{ i18n.t('team.empty') }}</p>
    </ng-template>
  </section>
</main>
