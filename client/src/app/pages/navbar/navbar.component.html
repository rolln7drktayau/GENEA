<aside class="side-nav" *ngIf="isAuthenticated">
  <header class="nav-header">
    <img class="logo-icon" src="assets/images/SignIn.svg" alt="GENEA" />
    <div class="brand">
      <strong>GENEA</strong>
      <small>{{ isAdmin ? i18n.t('nav.admin') : i18n.t('nav.user') }}</small>
    </div>
  </header>

  <nav class="tile-grid">
    <button type="button" class="tile" [class.active]="isActive('/home')" (click)="navigate('/home')">
      <i class="material-icons">home</i>
      <span>{{ i18n.t('nav.home') }}</span>
    </button>

    <button type="button" class="tile" [class.active]="isActive('/profile')" (click)="navigate('/profile')">
      <i class="material-icons">account_circle</i>
      <span>{{ i18n.t('nav.profile') }}</span>
    </button>

    <button type="button" class="tile" [class.active]="isActive('/family')" (click)="navigate('/family')">
      <i class="material-icons">auto_stories</i>
      <span>{{ i18n.t('nav.family') }}</span>
    </button>

    <button type="button" class="tile" [class.active]="isActive('/tree')" (click)="navigate('/tree')">
      <i class="material-icons">account_tree</i>
      <span>{{ i18n.t('nav.tree') }}</span>
    </button>

    <button type="button" class="tile" [class.active]="isActive('/memories')" (click)="navigate('/memories')">
      <i class="material-icons">perm_media</i>
      <span>{{ i18n.t('nav.memories') }}</span>
    </button>

    <button type="button" class="tile" *ngIf="isAdmin" [class.active]="isActive('/team')" (click)="navigate('/team')">
      <i class="material-icons">groups</i>
      <span>{{ i18n.t('nav.team') }}</span>
    </button>
  </nav>

  <footer class="nav-footer">
    <button type="button" class="tile ghost" (click)="toggleTheme()" [title]="i18n.t('nav.themeHint')">
      <i class="material-icons">{{ isDarkTheme ? 'light_mode' : 'dark_mode' }}</i>
      <span>{{ i18n.t(themeLabelKey) }}</span>
    </button>

    <button type="button" class="tile ghost" (click)="toggleLanguage()" [title]="i18n.t('nav.languageHint')">
      <i class="material-icons">translate</i>
      <span>{{ i18n.t('nav.language') }}</span>
    </button>

    <button type="button" class="tile danger" (click)="signOut()">
      <i class="material-icons">logout</i>
      <span>{{ i18n.t('nav.signOut') }}</span>
    </button>
  </footer>
</aside>
