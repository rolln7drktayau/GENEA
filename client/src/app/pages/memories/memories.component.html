<app-navbar></app-navbar>

<main class="app-page">
  <section class="page-panel">
    <header class="page-header">
      <h1 class="page-title">{{ i18n.t('memories.title') }}</h1>
      <p class="page-subtitle">{{ i18n.t('memories.subtitle') }}</p>
    </header>

    <label class="upload-box">
      <span>{{ i18n.t('memories.uploadLabel') }}</span>
      <input type="file" (change)="onFileSelected($event)" />
    </label>

    <div class="memory-grid" *ngIf="persons.length; else noPeople">
      <article class="memory-card" *ngFor="let person of persons">
        <header>
          <h3>{{ person.name || '-' }}</h3>
          <small>{{ person.email || '-' }}</small>
        </header>

        <div class="gallery" *ngIf="person.mem?.length; else noPhotoForPerson">
          <img *ngFor="let photoUrl of person.mem" [src]="photoUrl" [alt]="person.name" />
        </div>

        <ng-template #noPhotoForPerson>
          <p class="empty small">{{ i18n.t('memories.emptyPerson') }}</p>
        </ng-template>
      </article>
    </div>

    <ng-template #noPeople>
      <p class="empty">{{ i18n.t('memories.empty') }}</p>
    </ng-template>
  </section>
</main>
