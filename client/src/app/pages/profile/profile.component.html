<app-navbar></app-navbar>

<main class="app-page">
  <section class="page-panel profile-panel">
    <header class="page-header">
      <h1 class="page-title">{{ i18n.t('profile.title') }}</h1>
      <p class="page-subtitle">{{ i18n.t('profile.subtitle') }}</p>
    </header>

    <div class="feedback" *ngIf="feedback" [class.error]="isError">{{ feedback }}</div>

    <form class="profile-form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <label>
        <span>{{ i18n.t('profile.oldPassword') }}</span>
        <input type="password" formControlName="oldPassword" />
      </label>
      <small *ngIf="controlInvalid('oldPassword')">{{ i18n.t('profile.required') }}</small>

      <label>
        <span>{{ i18n.t('profile.newPassword') }}</span>
        <input type="password" formControlName="newPassword" />
      </label>
      <small *ngIf="controlInvalid('newPassword')">{{ i18n.t('profile.required') }}</small>

      <label>
        <span>{{ i18n.t('profile.confirmPassword') }}</span>
        <input type="password" formControlName="confirmPassword" />
      </label>
      <small *ngIf="controlInvalid('confirmPassword')">{{ i18n.t('profile.required') }}</small>

      <button class="primary" type="submit">{{ i18n.t('profile.submit') }}</button>
    </form>
  </section>
</main>
